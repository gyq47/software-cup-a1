services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.loongarch
    image: software-cup-a1-backend:loongarch
    container_name: software-cup-a1-backend
    ports:
      - "8000:8000"
    environment:
      DISABLE_CHROMA: "true"
      DISABLE_PDF_PREVIEW: "true"
      DISABLE_IMAGE_KNOWLEDGE: "true"
      DISABLE_LOCAL_EMBEDDING: "true"
      RAG_BACKEND: "langchain"
      QWEN_API_KEY: "${QWEN_API_KEY:-}"
      QWEN_BASE_URL: "${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}"
      QWEN_MODEL: "${QWEN_MODEL:-qwen-plus}"
      QWEN_VL_MODEL: "${QWEN_VL_MODEL:-qwen-vl-plus}"
    volumes:
      - ./backend/data/knowledge_graph:/app/backend/data/knowledge_graph
      - ./backend/data/cases:/app/backend/data/cases
      - ./backend/data/feedback:/app/backend/data/feedback
      - ./backend/data/manuals:/app/backend/data/manuals
      - ./backend/data/vector_store:/app/backend/data/vector_store
      - ./backend/data/manual_pages:/app/backend/data/manual_pages
      - ./uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.loongarch
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8000}"
    image: software-cup-a1-frontend:loongarch
    container_name: software-cup-a1-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
    depends_on:
      - backend
    restart: unless-stopped
